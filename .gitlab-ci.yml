image: python:3.11-slim

stages:
  - install
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

install-dependencies:
  stage: install
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt

run-tests:
  stage: test
  dependencies:
    - install-dependencies
  script:
    - mkdir -p reports
    - python -m robot
      --outputdir reports
      --pythonpath .
      features/
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - reports/log.html
      - reports/report.html
      - reports/output.xml
    reports:
      junit: reports/output.xml
  allow_failure: false