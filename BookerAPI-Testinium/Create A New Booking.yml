info:
  name: Create A New Booking
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/booking"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "firstname": "John",
        "lastname": "Wick",
        "totalprice": 111,
        "depositpaid": true,
        "bookingdates": {
          "checkin": "2016-01-01",
          "checkout": "2018-01-01"
        },
        "additionalneeds": "Breakfast"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const response = res.getBody();
        bru.setEnvVar("BOOKING_ID", response.bookingid);
        console.log("Booking ID:", response.bookingid);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
